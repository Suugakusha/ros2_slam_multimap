slam_toolbox:
  ros__parameters:
    # Standard ROS parameters.
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint 
    scan_topic: /scan
    mode: mapping
    
    # Experimental parameters.
    use_sim_time: true
    min_laser_range: 0.2
    max_laser_range: 10.0
    resolution: 0.05
    transform_publish_period: 0.02
